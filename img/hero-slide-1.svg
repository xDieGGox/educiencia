<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a4a5c"/>
      <stop offset="50%"  stop-color="#0d6678"/>
      <stop offset="100%" stop-color="#3ca6a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5fd4d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3ca6a6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo principal -->
  <rect width="1200" height="520" fill="url(#bg)"/>

  <!-- Anillos grandes centrados a la derecha -->
  <circle cx="920" cy="260" r="340" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <circle cx="920" cy="260" r="260" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>
  <circle cx="920" cy="260" r="180" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <circle cx="920" cy="260" r="100" fill="rgba(255,255,255,0.07)"/>

  <!-- Círculo brillante superior derecho -->
  <circle cx="1100" cy="80" r="120" fill="rgba(95,212,212,0.18)"/>
  <circle cx="1100" cy="80"  r="60"  fill="rgba(95,212,212,0.25)"/>

  <!-- Molécula / nodos conectados (derecha) -->
  <circle cx="860"  cy="155" r="18" fill="#5fd4d4" opacity="0.75"/>
  <circle cx="990"  cy="120" r="12" fill="#5fd4d4" opacity="0.55"/>
  <circle cx="790"  cy="240" r="14" fill="#5fd4d4" opacity="0.55"/>
  <circle cx="940"  cy="210" r="10" fill="#5fd4d4" opacity="0.45"/>
  <circle cx="860"  cy="370" r="16" fill="#5fd4d4" opacity="0.6"/>
  <circle cx="1000" cy="380" r="10" fill="#5fd4d4" opacity="0.45"/>
  <circle cx="1090" cy="280" r="13" fill="#5fd4d4" opacity="0.5"/>
  <circle cx="1140" cy="180" r="9"  fill="#5fd4d4" opacity="0.4"/>

  <!-- Líneas de enlace -->
  <line x1="860"  y1="155" x2="990"  y2="120" stroke="rgba(95,212,212,0.4)"  stroke-width="2"/>
  <line x1="860"  y1="155" x2="790"  y2="240" stroke="rgba(95,212,212,0.4)"  stroke-width="2"/>
  <line x1="860"  y1="155" x2="940"  y2="210" stroke="rgba(95,212,212,0.3)"  stroke-width="1.5"/>
  <line x1="860"  y1="370" x2="1000" y2="380" stroke="rgba(95,212,212,0.4)"  stroke-width="2"/>
  <line x1="1000" y1="380" x2="1090" y2="280" stroke="rgba(95,212,212,0.35)" stroke-width="1.5"/>
  <line x1="1090" y1="280" x2="1140" y2="180" stroke="rgba(95,212,212,0.3)"  stroke-width="1.5"/>
  <line x1="990"  y1="120" x2="1140" y2="180" stroke="rgba(95,212,212,0.25)" stroke-width="1.5"/>

  <!-- Hexágono central -->
  <polygon points="920,140 975,170 975,230 920,260 865,230 865,170"
           fill="rgba(255,255,255,0.06)" stroke="rgba(95,212,212,0.4)" stroke-width="2"/>

  <!-- Acento inferior izquierdo -->
  <rect x="0" y="480" width="1200" height="40" fill="url(#glow)"/>

  <!-- Banda inferior de color -->
  <rect x="0" y="510" width="1200" height="10" fill="rgba(60,166,166,0.55)"/>
</svg>
