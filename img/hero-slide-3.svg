<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e3520"/>
      <stop offset="50%"  stop-color="#155230"/>
      <stop offset="100%" stop-color="#3ca6a6"/>
    </linearGradient>
    <radialGradient id="glow3" cx="80%" cy="45%" r="35%">
      <stop offset="0%"   stop-color="#3ca6a6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3ca6a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#bg3)"/>
  <rect width="1200" height="520" fill="url(#glow3)"/>

  <!-- Anillo de fondo -->
  <circle cx="930" cy="260" r="310" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <circle cx="930" cy="260" r="220" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>

  <!-- Documentos apilados (perspectiva) -->
  <!-- Página 3 (fondo) -->
  <rect x="835" y="110" width="220" height="290" rx="10"
        fill="rgba(255,255,255,0.07)" stroke="rgba(60,166,166,0.25)" stroke-width="1.5"
        transform="rotate(-9 945 255)"/>
  <!-- Página 2 -->
  <rect x="840" y="105" width="220" height="290" rx="10"
        fill="rgba(255,255,255,0.12)" stroke="rgba(60,166,166,0.35)" stroke-width="1.5"
        transform="rotate(-4 950 250)"/>
  <!-- Página 1 (frente) -->
  <rect x="840" y="95"  width="220" height="290" rx="10"
        fill="rgba(255,255,255,0.2)"  stroke="rgba(95,212,212,0.55)" stroke-width="2"/>

  <!-- Líneas de contenido en página frontal -->
  <rect x="862" y="128" width="72"  height="9"  rx="4" fill="#5fd4d4" opacity="0.85"/>
  <rect x="862" y="148" width="176" height="6"  rx="3" fill="rgba(255,255,255,0.45)"/>
  <rect x="862" y="161" width="150" height="5"  rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="862" y="173" width="168" height="5"  rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="862" y="185" width="130" height="5"  rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="862" y="200" width="158" height="5"  rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="862" y="212" width="140" height="5"  rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="862" y="224" width="165" height="5"  rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Ícono de descarga -->
  <circle cx="870" cy="348" r="22" fill="rgba(60,166,166,0.55)"/>
  <line x1="870" y1="338" x2="870" y2="356" stroke="white" stroke-width="3"/>
  <polyline points="862,350 870,360 878,350" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>

  <!-- Símbolos flotantes -->
  <text x="1090" y="160" font-family="Georgia,serif" font-size="38"
        fill="rgba(95,212,212,0.5)" transform="rotate(-14 1090 160)">∑</text>
  <text x="780"  y="200" font-family="Georgia,serif" font-size="28"
        fill="rgba(95,212,212,0.4)" transform="rotate(8 780 200)">π</text>
  <text x="1120" y="360" font-family="Georgia,serif" font-size="32"
        fill="rgba(95,212,212,0.4)" transform="rotate(6 1120 360)">∫</text>
  <text x="770"  y="380" font-family="Georgia,serif" font-size="24"
        fill="rgba(95,212,212,0.35)" transform="rotate(-5 770 380)">Δ</text>

  <!-- Estrella decorativa -->
  <circle cx="1050" cy="100" r="6"  fill="rgba(95,212,212,0.6)"/>
  <circle cx="1130" cy="430" r="5"  fill="rgba(95,212,212,0.5)"/>
  <circle cx="770"  cy="440" r="7"  fill="rgba(95,212,212,0.45)"/>

  <!-- Banda inferior -->
  <rect x="0" y="510" width="1200" height="10" fill="rgba(60,166,166,0.55)"/>
</svg>
