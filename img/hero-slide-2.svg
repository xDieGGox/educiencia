<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1a4e"/>
      <stop offset="50%"  stop-color="#2d2060"/>
      <stop offset="100%" stop-color="#ee552c"/>
    </linearGradient>
    <radialGradient id="spot" cx="75%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#ee552c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ee552c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#bg2)"/>
  <rect width="1200" height="520" fill="url(#spot)"/>

  <!-- Anillos -->
  <circle cx="950" cy="260" r="320" fill="none" stroke="rgba(238,85,44,0.1)"  stroke-width="2"/>
  <circle cx="950" cy="260" r="230" fill="none" stroke="rgba(238,85,44,0.14)" stroke-width="2"/>
  <circle cx="950" cy="260" r="140" fill="rgba(238,85,44,0.1)"/>

  <!-- Persona central (derecha) -->
  <circle cx="960" cy="200" r="42" fill="rgba(255,255,255,0.18)"/>
  <circle cx="960" cy="186" r="20" fill="rgba(255,255,255,0.65)"/>
