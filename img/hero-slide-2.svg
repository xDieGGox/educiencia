  <line x1="996" y1="218" x2="1076" y2="210" stroke="rgba(238,85,44,0.6)" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="840" y1="170" x2="1100" y2="165" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Puntos decorativos -->
